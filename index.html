    <meta charset="UTF-8">

    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>

    <style>
        body {
            background-color: #ffffff;
            font-family: 'Arial', sans-serif;
            color: #000000;
        }
        .chart-container {
            border: 2px solid #000000;
            background: white;
            padding: 20px;
        }
        .nav-button {
            padding: 10px 24px;
            border: 3px solid #000;
            font-weight: 900;
            font-size: 16px;
            transition: all 0.2s;
            background: #fff;
            text-transform: none;
        }
        .nav-button.active {
            background: #000;
            color: #fff;
        }

<body class="p-6">
    <div class="max-w-[1700px] mx-auto">
        <!-- Header -->
        <header class="mb-8 flex justify-between items-end border-b-4 border-black pb-4">
            <div>
                <h1 class="text-4xl font-black text-black" style="font-family: Arial;">
                    Ecological Risk Research Divergence in Renewable Energy
                </h1>
                <p class="text-xl font-black text-gray-800">Bibliometric Analysis Dashboard (2010 - 2026)</p>
            </div>
            <div class="flex gap-3" id="sector-nav">
                <button onclick="updateDashboard('Solar')" id="btn-Solar" class="nav-button active">Solar PV</button>
                <button onclick="updateDashboard('Wind')" id="btn-Wind" class="nav-button">Wind Power</button>
                <button onclick="updateDashboard('Storage')" id="btn-Storage" class="nav-button">Energy Storage</button>
                <button onclick="updateDashboard('Nuclear')" id="btn-Nuclear" class="nav-button">Hydro/Nuclear</button>
            </div>
        </header>

        <!-- Main Content -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Left: Composite Plot (Bar + Lines) -->
            <div class="chart-container">
                <div class="mb-4 text-center">
                    <span class="text-2xl font-black" style="font-family: Arial;">(a) Publication Trends & Risk Correlation</span>
                </div>
                <div id="composite-plot" class="w-full h-[650px]"></div>
            </div>

            <!-- Right: Heatmap Plot -->
            <div class="chart-container">
                <div class="mb-4 text-center">
                    <span class="text-2xl font-black" style="font-family: Arial;">(b) Keyword Evolution & Frequency Matrix</span>
                </div>
                <div id="heatmap-plot" class="w-full h-[650px]"></div>
            </div>
        </div>

        <footer class="mt-6 text-lg font-black text-black flex justify-between border-t-2 border-black pt-4">

        function getStars(val) {
            if (val >= 150) return "★★★★★";
            if (val >= 100) return "★★★★";
            if (val >= 50) return "★★★";
            if (val >= 10) return "★★";
            if (val > 0) return "★";
            return "";
        }

        const heavyFont = { family: 'Arial', size: 18, color: '#000000', weight: 900 };
        const axisFont = { family: 'Arial', size: 16, color: '#000000', weight: 900 };

        function drawComposite(sector) {
            const d = dataSet[sector];

            // 柱状图：从左到右渐变 (蓝 -> 绿 -> 黄 -> 红)
            const colors = years.map((_, index) => {
                const ratio = index / (years.length - 1);
                if (ratio < 0.0625) return '#1e3a8a';
                if (ratio < 0.125) return '#1e4d8f';
                if (ratio < 0.1875) return '#1f6194';
                if (ratio < 0.25) return '#207599';

                if (ratio < 0.3125) return '#21899e';
                if (ratio < 0.375) return '#229da3';
                if (ratio < 0.4375) return '#23b1a8';
                if (ratio < 0.5) return '#34b6a4';

                if (ratio < 0.5625) return '#55b89b';
                if (ratio < 0.625) return '#77ba92';
                if (ratio < 0.6875) return '#99bc89';
                if (ratio < 0.75) return '#bbbe80';

                if (ratio < 0.8125) return '#ddb877';
                if (ratio < 0.875) return '#f58a56';
                if (ratio < 0.9375) return '#fa6a44';

                return '#b91c1c';
            });

            const traceBar = {
                x: years, y: d.total, name: 'Publication Volume (Total)',
                type: 'bar',
                marker: { color: colors, line: { width: 1.5, color: '#000000' } },
                yaxis: 'y2', opacity: 0.8
            };

            const traceLine1 = {
                x: years, y: d.climate, name: 'Energy-Climate Vulnerability',
                type: 'scatter', mode: 'lines+markers',
                line: { color: '#ef4444', width: 4 },
                marker: { size: 12, symbol: 'circle', line: { width: 2, color: 'black' } }
            };

            const traceLine2 = {
                x: years, y: d.risk, name: 'Secondary Ecological Risks',
                type: 'scatter', mode: 'lines+markers',
                line: { color: '#000000', width: 4, dash: 'dash' },
                marker: { size: 12, symbol: 'diamond', line: { width: 2, color: 'white' } }
            };

            const layout = {
                showlegend: true,
                legend: { x: 0.02, y: 0.98, font: { family: 'Arial', size: 12, weight: 'bold' }, borderwidth: 2 },
                margin: { l: 80, r: 80, t: 30, b: 80 },
                xaxis: {
                    title: 'Year', titlefont: heavyFont, tickfont: axisFont,
                    showline: true, linecolor: 'black', linewidth: 3, mirror: true,
                    tickmode: 'linear', dtick: 1, ticks: 'outside', tickwidth: 2, ticklen: 8
                },
                yaxis: {
                    title: 'Risk Research Count', titlefont: heavyFont, tickfont: axisFont,
                    showline: true, linecolor: 'black', linewidth: 3, mirror: true,
                    zeroline: false, ticks: 'outside', tickwidth: 2
                },
                yaxis2: {
                    title: 'Total Pub. Volume', titlefont: heavyFont, tickfont: axisFont,
                    overlaying: 'y', side: 'right', showgrid: false,
                    showline: true, linecolor: 'black', linewidth: 3, ticks: 'outside'
                },
                hovermode: 'x unified',
                bargap: 0.2
            };

            Plotly.newPlot('composite-plot', [traceBar, traceLine1, traceLine2], layout, {responsive: true, displayModeBar: false});
        }

        function drawHeatmap(sector) {
            const zData = dataSet[sector].heatmap;
            let textData = [];

            zData.forEach((row, i) => {
                let rowText = [];
                row.forEach((val) => {
                    rowText.push(`${Math.floor(val)}<br><span style="font-size:10px">${getStars(val)}</span>`);
                });
                textData.push(rowText);
            });

            const data = [{
                z: zData, x: years, y: keywords,
                type: 'heatmap',
                colorscale: [
                    [0, '#1e3a8a'], [0.25, '#22c55e'], [0.5, '#eab308'], [0.75, '#f97316'], [1, '#b91c1c']
                ],
                text: textData, hoverinfo: 'text',
                showscale: true,
                colorbar: {
                    title: { text: 'Freq.', font: { family: 'Arial', size: 16, weight: 'bold' } },
                    tickfont: { family: 'Arial', size: 14, weight: 'bold' },
                    thickness: 20
                }
            }];

            const layout = {
                margin: { l: 180, r: 20, t: 30, b: 80 },
                xaxis: {
                    title: 'Analysis year', titlefont: heavyFont, tickfont: axisFont,
                    showline: true, linecolor: 'black', linewidth: 3, mirror: true,
                    tickmode: 'linear', dtick: 1, ticks: 'outside', ticklen: 8
                },
                yaxis: {
                    title: '', tickfont: { ...axisFont, size: 14 },
                    showline: true, linecolor: 'black', linewidth: 3, mirror: true,
                    autorange: 'reversed', ticks: 'outside'
                },
                height: 650,
                annotations: []
            };

            for(let i=0; i<keywords.length; i++){
                for(let j=0; j<years.length; j++){
                    let val = zData[i][j];
                    layout.annotations.push({
                        x: years[j], y: keywords[i],
                        text: `<b style="font-family:Arial; font-size:12px">${Math.floor(val)}</b><br><span style="font-size:10px">${getStars(val)}</span>`,
                        showarrow: false,
                        font: { color: val > 140 || val < 40 ? 'white' : 'black', weight: 'bold' }
                    });
                }
            }

            Plotly.newPlot('heatmap-plot', data, layout, {responsive: true, displayModeBar: false});
        }

        function updateDashboard(sector) {
            document.querySelectorAll('.nav-button').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${sector}`).classList.add('active');
            drawComposite(sector);
            drawHeatmap(sector);
        }

        window.onload = () => {
            updateDashboard('Solar');
        };
    </script>

</html>
